# Staging override — bring the MULTITENANT stack up next to the live per-town fleet on
# the SAME box, WITHOUT touching the live :80/:443 or any live data.
#
# It uses the base compose's own project name (`townbrief-prod`) and network
# (`townbrief_prod`) — both DISTINCT from the live `townbrief` fleet, so volumes,
# containers, and network never collide. Because Compose names everything by PROJECT
# (not directory) and the compose uses relative paths, you can later
#   `mv /root/townbrief-mt /root/townbrief`
# (after deleting the old fleet) and keep running the SAME stack from the new path.
#
# What this override does: publishes Ghost on 127.0.0.1:2369 (loopback only) so you can
# smoke-test the multitenant app by Host header without TLS/Caddy. Caddy + superadmin are
# simply not listed in the `up` command below during staging (Caddy/wildcard ACME wait on
# DNS moving to Cloudflare; superadmin is added at cutover for SSO).
#
# Stand up (from /root/townbrief-mt/deploy, after `cp .env.example .env` + setting the
# two passwords):
#   docker compose -f compose.production.yaml -f compose.staging.yaml up -d postgres redis ghost
#
# Verify the runtime role is NON-super (RLS is load-bearing):
#   docker compose -f compose.production.yaml exec postgres \
#     psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" \
#     -c "SELECT rolname, rolsuper, rolbypassrls FROM pg_roles WHERE rolname='ghost_app';"
#
# Smoke-test the multitenant app by Host header (no TLS needed):
#   curl -s -H 'Host: middlesexcounty.townbrief.com' http://127.0.0.1:2369/ -o /dev/null -w 'HTTP %{http_code}\n'
#
# Provision a test tenant, then re-curl it:
#   docker compose -f compose.production.yaml exec ghost \
#     node scripts/townbrief-add-site.js --slug=wayland --name="Wayland" \
#       --host=wayland.townbrief.com --owner-email=editor@townbrief.com
#
# Tear down (live fleet untouched); add -v to also drop staging volumes for a clean re-test:
#   docker compose -f compose.production.yaml -f compose.staging.yaml down

services:
  ghost:
    # Base compose publishes no ghost ports, so this loopback publish is a safe append.
    ports:
      - "127.0.0.1:2369:2368"
