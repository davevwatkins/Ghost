name: ghost-dev

services:
  # TownBrief multitenancy: Postgres replaces MySQL. RLS + partition-by-site_id
  # are load-bearing for the multitenant model; see deploy/MULTITENANCY.md.
  postgres:
    image: postgres:17-alpine
    container_name: ghost-dev-postgres
    # Tuned to minimize host impact during dev. Bump these for perf testing.
    command: >
      postgres
      -c shared_buffers=128MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=256MB
      -c max_connections=50
      -c wal_level=logical
    ports:
      # 5433 on host to avoid clashing with any locally-installed Postgres.
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ghost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ghost}
      POSTGRES_DB: ${POSTGRES_DB:-ghost_dev}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      # TownBrief Phase 1.5c: separate non-super runtime role so RLS
      # actually enforces (Postgres bypasses RLS for superusers, even
      # with FORCE). Bootstrap user (POSTGRES_USER above) stays super
      # for ops + init; Ghost connects as GHOST_APP_USER below.
      GHOST_APP_USER: ${GHOST_APP_USER:-ghost_app}
      GHOST_APP_PASSWORD: ${GHOST_APP_PASSWORD:-ghost_app}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Init scripts run ONCE on fresh init (empty data dir). For
      # existing volumes, run docker/postgres-init/01-ghost-app-role.sh
      # manually via docker exec.
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ghost} -d ${POSTGRES_DB:-ghost_dev}"]
      interval: 1s
      retries: 120
      timeout: 5s
      start_period: 5s

  redis:
    image: redis:7.0@sha256:352c1fdadc91926edda08f45aeb3f27f37194c2f14101229c0523a11195c96e3
    container_name: ghost-dev-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - --raw
        - incr
        - ping
      interval: 1s
      retries: 120

  mailpit:
    image: axllent/mailpit@sha256:3bd7c2f2696deb35a4780d152b404dceec99cb041b942c0877b3b22384714f85
    container_name: ghost-dev-mailpit
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web interface
      - "8026:8025"  # Web interface (for e2e tests)
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025"]
      interval: 1s
      retries: 30

  # Main development Ghost instance
  # Additional instances can be created programmatically via E2E GhostManager
  ghost-dev:
    build:
      context: ./
      dockerfile: docker/ghost-dev/Dockerfile
    container_name: ghost-dev
    working_dir: /home/ghost/ghost/core
    command: ["pnpm", "dev"]
    volumes:
      # Keep the runtime workspace graph aligned with the packages installed
      # by docker/ghost-dev/Dockerfile. Mounting all of ghost/ exposes
      # ghost/admin, which depends on apps/* and causes pnpm to repair the
      # workspace before running scripts.
      - ./ghost/core:/home/ghost/ghost/core
      - ./ghost/i18n:/home/ghost/ghost/i18n
      - ./ghost/parse-email-address:/home/ghost/ghost/parse-email-address
      # Anonymous volumes shield the container's image-baked node_modules
      # from the host bind-mount. Windows pnpm truncates patch-hash dirs to
      # avoid MAX_PATH; Linux pnpm doesn't. The two layouts can't be shared
      # via bind-mount, so we let the container keep its own.
      - /home/ghost/ghost/core/node_modules
      - /home/ghost/ghost/i18n/node_modules
      - /home/ghost/ghost/parse-email-address/node_modules
      # Mount specific content subdirectories to preserve themes/adapters from source
      - ghost-dev-data:/home/ghost/ghost/core/content/data
      - ghost-dev-images:/home/ghost/ghost/core/content/images
      - ghost-dev-media:/home/ghost/ghost/core/content/media
      - ghost-dev-files:/home/ghost/ghost/core/content/files
      - ghost-dev-logs:/home/ghost/ghost/core/content/logs
      - shared-config:/mnt/shared-config:ro
    environment:
      NODE_ENV: development
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      DEBUG: ${DEBUG:-}
      pnpm_config_verify_deps_before_run: "false"
      database__client: pg
      database__connection__host: postgres
      database__connection__port: "5432"
      # TownBrief Phase 1.5c: runtime connects as the non-super
      # ghost_app role so RLS actually enforces. Migrations also run as
      # this role (it owns the schema).
      database__connection__user: ${GHOST_APP_USER:-ghost_app}
      database__connection__password: ${GHOST_APP_PASSWORD:-ghost_app}
      database__connection__database: ${POSTGRES_DB:-ghost_dev}
      server__host: 0.0.0.0
      server__port: 2368
      # Tell Ghost the externally-reachable URL (via the Caddy gateway on
      # port 80), not its in-container 2368. The admin session origin check
      # (ghost/core/core/server/services/auth/session/session-service.js)
      # compares the browser's Origin header against urlUtils.getAdminUrl();
      # without this set, Ghost defaults to host:server__port which makes
      # signin POSTs from the port-80 tab fail with a 400 "incorrect origin".
      url: ${GHOST_PUBLIC_URL:-http://middlesexcounty.localtest.me}
      mail__transport: SMTP
      mail__options__host: mailpit
      mail__options__port: 1025
      # Redis cache (optional)
      adapters__cache__Redis__host: redis
      adapters__cache__Redis__port: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy
      stripe:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:2368',{redirect:'manual'}).then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"]
      timeout: 5s
      retries: 10
      start_period: 5s

  # Caddy reverse proxy for the main dev instance
  # Routes Ghost backend + proxies asset requests to host dev servers
  ghost-dev-gateway:
    build:
      context: ./docker/dev-gateway
      dockerfile: Dockerfile
    container_name: ghost-dev-gateway
    ports:
      - "2368:80"
      - "80:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Mount Caddyfile for live config changes without rebuilding
      - ./docker/dev-gateway/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      ghost-dev:
        condition: service_healthy

  ghost-dev-superadmin:
    build:
      context: ./docker/superadmin
      dockerfile: Dockerfile
    container_name: ghost-dev-superadmin
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGDATABASE=ghost_dev
      - PGUSER=ghost
      - PGPASSWORD=ghost
      - GHOST_ADMIN_HOST=middlesexcounty.localtest.me
      - ADMIN_USER=${SUPERADMIN_USER:-admin}
      - ADMIN_PASS=${SUPERADMIN_PASS:-townbrief2026}
      - SESSION_SECRET=${SUPERADMIN_SESSION_SECRET:-townbrief-superadmin-dev-secret-change-in-prod}
      - PORT=3001
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  stripe:
    image: stripe/stripe-cli:latest@sha256:ac5920c06aa0ecd95e86366cb849de7acd39396e11cf2d0b16ea0e91cbb655ec
    container_name: ghost-dev-stripe
    entrypoint: ["/entrypoint.sh"]
    profiles: ["stripe"]
    volumes:
      - ./docker/stripe/entrypoint.sh:/entrypoint.sh:ro
      - shared-config:/mnt/shared-config
    environment:
      - GHOST_URL=${GHOST_URL:-http://ghost-dev:2368}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
    healthcheck:
      test: ["CMD", "test", "-f", "/mnt/shared-config/.env.stripe"]
      interval: 1s
      retries: 120

volumes:
  postgres-data:
  redis-data:
  shared-config:
  ghost-dev-data:
  ghost-dev-images:
  ghost-dev-media:
  ghost-dev-files:
  ghost-dev-logs:

networks:
  default:
    name: ghost_dev
