<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TownBrief Admin — Sign in</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 min-h-screen flex items-center justify-center">
<div class="w-full max-w-sm">
  <div class="text-center mb-8">
    <div class="text-white text-2xl font-bold tracking-tight">TownBrief</div>
    <div class="text-gray-400 text-sm mt-1">Superadmin Dashboard</div>
  </div>
  <form method="POST" action="/login" class="bg-gray-900 rounded-xl p-8 shadow-2xl border border-gray-800">
    <h1 class="text-white text-lg font-semibold mb-6">Sign in</h1>
    <div id="error-msg" class="hidden mb-4 text-sm text-red-400 bg-red-950 border border-red-800 rounded-lg px-4 py-3">
      Incorrect username or password.
    </div>
    <div class="mb-4">
      <label class="block text-gray-400 text-sm mb-2" for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username"
        class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
        placeholder="admin" required>
    </div>
    <div class="mb-6">
      <label class="block text-gray-400 text-sm mb-2" for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password"
        class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
        required>
    </div>
    <button type="submit"
      class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg px-4 py-2.5 text-sm transition-colors">
      Sign in
    </button>
  </form>
</div>
<script>
  if (location.search.includes('error=1')) {
    document.getElementById('error-msg').classList.remove('hidden');
  }
</script>
</body>
</html>
